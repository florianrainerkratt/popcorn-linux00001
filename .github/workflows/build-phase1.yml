name: Popcorn Linux Phase 1 (Interaktives Debugging)

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  debug-build:
    runs-on: ubuntu-latest
    steps:
      - name: 1. System-Abhängigkeiten installieren
        run: |
          sudo apt-get update
          sudo apt-get install -y crossbuild-essential-arm64 cpio wget bzip2 libncurses5-dev
      
      - name: 2. BusyBox Quellcode herunterladen
        run: |
          wget https://busybox.net/downloads/busybox-1.36.1.tar.bz2
          tar -xjf busybox-1.36.1.tar.bz2

      - name: 3. Live SSH-Terminal starten
        uses: mxschmitt/action-tmate@v3
        with:
          limit-access-to-actor: false
