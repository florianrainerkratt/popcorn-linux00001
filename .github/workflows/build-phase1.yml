name: Popcorn Linux Phase 1 (BusyBox Initramfs)

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-initramfs:
    runs-on: ubuntu-latest
    steps:
      - name: 1. System-Abhängigkeiten installieren
        run: |
          sudo apt-get update
          sudo apt-get install -y crossbuild-essential-arm64 cpio wget bzip2
      
      - name: 2. BusyBox Quellcode herunterladen
        run: |
          wget https://busybox.net/downloads/busybox-1.36.1.tar.bz2
          tar -xjf busybox-1.36.1.tar.bz2
      
      - name: 3. BusyBox für ARM64 konfigurieren und statisch kompilieren
        run: |
          cd busybox-1.36.1
          # Standardkonfiguration erstellen
          make ARCH=arm64 CROSS_COMPILE=aarch64-linux-gnu- defconfig
          
          # Sicherstellen, dass das statische Linken korrekt im Makefile verankert ist
          sed -i 's/CONFIG_STATIC is not set/CONFIG_STATIC=y/' .config
          
          # Kompilieren und die statischen Flags explizit an den Linker übergeben
          make ARCH=arm64 CROSS_COMPILE=aarch64-linux-gnu- LDFLAGS="--static" -j$(nproc)
          
      - name: 4. Initramfs-Struktur aufbauen und verpacken
        run: |
          mkdir -p ../initramfs_root/{bin,sbin,etc,proc,sys,usr/bin,usr/sbin}
          cp busybox-1.36.1/busybox ../initramfs_root/bin/
          
          cd ../initramfs_root
          ln -sf bin/busybox init
          ln -sf busybox bin/sh
          
          find . -print0 | cpio --null -ov --format=newc | gzip -9 > ../initramfs.cpio.gz
          
      - name: 5. Fertiges Image bereitstellen
        uses: actions/upload-artifact@v4
        with:
          name: initramfs-aarch64
          path: initramfs.cpio.gz
