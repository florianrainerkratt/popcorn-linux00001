name: Popcorn Linux Phase 1 & 2 (BusyBox Initramfs mit Mounts)

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-initramfs:
    runs-on: ubuntu-latest
    steps:
      - name: 1. System-Abhängigkeiten installieren
        run: |
          sudo apt-get update
          sudo apt-get install -y crossbuild-essential-arm64 cpio wget bzip2
      
      - name: 2. BusyBox Quellcode herunterladen
        run: |
          wget https://busybox.net/downloads/busybox-1.36.1.tar.bz2
          tar -xjf busybox-1.36.1.tar.bz2
      
      - name: 3. BusyBox für ARM64 konfigurieren und statisch kompilieren
        run: |
          cd busybox-1.36.1
          make ARCH=arm64 CROSS_COMPILE=aarch64-linux-gnu- defconfig
          
          sed -i 's/# CONFIG_STATIC is not set/CONFIG_STATIC=y/' .config
          sed -i 's/CONFIG_STATIC=n/CONFIG_STATIC=y/' .config
          sed -i 's/CONFIG_TC=y/CONFIG_TC=n/' .config
          sed -i 's/# CONFIG_TC is not set/CONFIG_TC=n/' .config
          
          yes "" | make ARCH=arm64 CROSS_COMPILE=aarch64-linux-gnu- oldconfig
          make ARCH=arm64 CROSS_COMPILE=aarch64-linux-gnu- -j$(nproc)
          
      - name: 4. Initramfs-Struktur aufbauen, Skripte einbetten und verpacken
        run: |
          WORKSPACE_DIR=$(pwd)
          
          # Systemstruktur inklusive dev und etc/init.d anlegen
          mkdir -p ../initramfs_root/{bin,sbin,etc/init.d,proc,sys,dev,usr/bin,usr/sbin}
          cp busybox-1.36.1/busybox ../initramfs_root/bin/
          
          cd ../initramfs_root
          ln -sf bin/busybox init
          ln -sf busybox bin/sh
          
          # Virtuelle Terminals umleiten auf serielle Konsole (ttyAMA0)
          cat << 'INNER_EOF' > etc/inittab
          ::sysinit:/etc/init.d/rcS
          ::askfirst:-/bin/sh
          ::ctrlaltdel:/sbin/reboot
          INNER_EOF
          
          # Startskript für automatische Cluster-Mounts (/proc, /sys, /dev)
          cat << 'INNER_EOF' > etc/init.d/rcS
          #!/bin/sh
          # Erstellt alle Shortcuts wie mount, ls, cat im System
          /bin/busybox --install -s
          
          mount -t proc proc /proc
          mount -t sysfs sysfs /sys
          mount -t devtmpfs devtmpfs /dev
          
          echo "=============================================="
          echo "  Popcorn Linux (ARM64) erfolgreich gebootet! "
          echo "=============================================="
          INNER_EOF
          
          # Skript ausführbar machen
          chmod +x etc/init.d/rcS
          
          # Als cpio-Archiv im Haupt-Workspace verpacken
          find . -print0 | cpio --null -ov --format=newc | gzip -9 > "$WORKSPACE_DIR/initramfs.cpio.gz"
          
      - name: 5. Fertiges Image bereitstellen
        uses: actions/upload-artifact@v4
        with:
          name: initramfs-aarch64
          path: initramfs.cpio.gz
